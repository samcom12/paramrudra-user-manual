name: Build & Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install WeasyPrint system libraries (for PDF export)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0 \
            libcairo2 libgdk-pixbuf-2.0-0 libffi-dev fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build site (always succeeds)
        run: mkdocs build --site-dir _site

      - name: Generate PDF and overlay it (non-blocking)
        continue-on-error: true
        env:
          ENABLE_PDF_EXPORT: "1"
        run: |
          mkdocs build --site-dir _pdfbuild
          mkdir -p _site/assets
          cp _pdfbuild/assets/PARAM-Rudra-20PF-User-Manual.pdf _site/assets/ \
            && echo "PDF overlaid into _site/assets/" \
            || echo "PDF not produced; site still deploys without it"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
