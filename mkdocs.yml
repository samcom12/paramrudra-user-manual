site_name: C-DAC PARAM Rudra — 20 PetaFlop Supercomputer
site_description: >-
  Official-style user guide for the C-DAC PARAM Rudra 20 PetaFlop supercomputer
  (National Supercomputing Mission) — access, environment, Spack, SLURM batch
  system, GPU computing, applications and data management.
site_author: C-DAC HPC Technologies · PARAM Rudra (20 PF) · National Supercomputing Mission
site_url: https://samcom12.github.io/paramrudra-user-manual/

repo_name: C-DAC PARAM Rudra · 20 PF
repo_url: https://github.com/samcom12/paramrudra-user-manual
edit_uri: edit/main/docs/

copyright: >-
  C-DAC PARAM Rudra — 20 PetaFlop Supercomputer · National Supercomputing Mission.
  Community-maintained user guide; verify site-specific values with the C-DAC
  support desk (rudrasupport@cdac.in).

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/logo.svg

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - with-pdf:
      enabled_if_env: ENABLE_PDF_EXPORT
      output_path: assets/PARAM-Rudra-20PF-User-Manual.pdf
      cover_title: PARAM Rudra — 20 PetaFlop Supercomputer
      cover_subtitle: C-DAC · National Supercomputing Mission · User Manual
      author: C-DAC HPC Technologies
      copyright: C-DAC PARAM Rudra (20 PF) · National Supercomputing Mission
      toc_level: 3
      ordered_chapter_level: 2
      two_columns_level: 0

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/samcom12/paramrudra-user-manual
  generator: false

nav:
  - Home: index.md
  - Getting Access: access.md
  - System Configuration: configuration.md
  - Environment: environment.md
  - Modules & Conda: modules.md
  - Spack Packages: spack.md
  - Building Software: building.md
  - Batch System (SLURM): batch.md
  - GPU Computing: gpu.md
  - Machine Learning / DL: machine-learning.md
  - Applications:
      - Overview: applications/index.md
      - GROMACS: applications/gromacs.md
      - LAMMPS: applications/lammps.md
      - NAMD: applications/namd.md
      - OpenFOAM: applications/openfoam.md
      - WRF: applications/wrf.md
      - Quantum Chemistry & Others: applications/quantum-chemistry.md
  - Job Script Examples: examples.md
  - Best Practices & Performance: best-practices.md
  - Debugging: debugging.md
  - Data Management: data.md
  - Policies: policies.md
  - Accounts & Acknowledgement: acknowledgement.md
  - Contributing: contributing.md
  - FAQ & Support: support.md
