<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" role="img" aria-label="PARAM Rudra system architecture diagram">
  <defs>
    <linearGradient id="fab" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f3a93"/>
      <stop offset="1" stop-color="#2453ff"/>
    </linearGradient>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- panel background (light card: readable on light or dark pages) -->
  <rect x="1" y="1" width="778" height="518" rx="14" fill="#ffffff" stroke="#d5d9e6" stroke-width="1.5"/>
  <text x="390" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="18" font-weight="700" fill="#1f2a6b">PARAM Rudra — System Architecture</text>

  <!-- Users -->
  <rect x="300" y="52" width="180" height="46" rx="8" fill="#eef2f7" stroke="#9aa4bf"/>
  <text x="390" y="73" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#243">Remote Users</text>
  <text x="390" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#556">SSH :4422 · 2FA (OTP + CAPTCHA)</text>

  <!-- arrow users -> gateways -->
  <line x1="390" y1="98" x2="390" y2="120" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arw)"/>

  <!-- Gateway row: login + service -->
  <rect x="150" y="122" width="230" height="58" rx="8" fill="#e8ecfb" stroke="#1f3a93"/>
  <text x="265" y="146" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2a6b">Login Nodes ×14</text>
  <text x="265" y="164" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#445">gateway · edit · compile · submit</text>

  <rect x="400" y="122" width="230" height="58" rx="8" fill="#eef2f7" stroke="#9aa4bf"/>
  <text x="515" y="146" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334">Service Nodes</text>
  <text x="515" y="164" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#556">Management ×24 · Visualization ×2</text>

  <!-- arrows down to fabric -->
  <line x1="265" y1="180" x2="265" y2="210" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="515" y1="180" x2="515" y2="210" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arw)"/>

  <!-- InfiniBand fabric -->
  <rect x="60" y="212" width="660" height="40" rx="8" fill="url(#fab)"/>
  <text x="390" y="237" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="0.5">InfiniBand NDR — High-Bandwidth, Low-Latency Fabric</text>

  <!-- arrows fabric -> compute -->
  <line x1="175" y1="252" x2="175" y2="284" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="390" y1="252" x2="390" y2="284" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="605" y1="252" x2="605" y2="284" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arw)"/>

  <!-- Compute tiers -->
  <!-- CPU -->
  <rect x="66" y="286" width="218" height="96" rx="9" fill="#e8ecfb" stroke="#1f3a93" stroke-width="1.4"/>
  <text x="175" y="309" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2a6b">CPU Compute · 2,266</text>
  <text x="175" y="330" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.8" fill="#445">cbcn* · partition cpu</text>
  <text x="175" y="347" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.8" fill="#445">2× Xeon Gold 6240R · 48c</text>
  <text x="175" y="364" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.8" fill="#445">192 GB · 800 GB SSD</text>

  <!-- GPU -->
  <rect x="296" y="286" width="188" height="96" rx="9" fill="#e9f7ef" stroke="#1f8a4c" stroke-width="1.4"/>
  <text x="390" y="309" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#136a3a">GPU Compute · 320</text>
  <text x="390" y="330" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.8" fill="#245">cbgpu* · partition gpu</text>
  <text x="390" y="347" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.8" fill="#245">2× NVIDIA A100 80 GB</text>
  <text x="390" y="364" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.8" fill="#245">sm_80 · 640 GPUs total</text>

  <!-- HM -->
  <rect x="496" y="286" width="218" height="96" rx="9" fill="#fdf1e3" stroke="#b5651d" stroke-width="1.4"/>
  <text x="605" y="309" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#8a4a12">High-Memory · 320</text>
  <text x="605" y="330" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.8" fill="#553">cbhm* · partition hm</text>
  <text x="605" y="347" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.8" fill="#553">2× Xeon Gold 6240R · 48c</text>
  <text x="605" y="364" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.8" fill="#553">768 GB · 800 GB SSD</text>

  <!-- Storage -->
  <line x1="390" y1="382" x2="390" y2="410" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arw)"/>
  <rect x="200" y="412" width="380" height="52" rx="9" fill="#eef2f7" stroke="#6b7fae" stroke-width="1.4"/>
  <text x="390" y="434" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#2a3560">Lustre Parallel Filesystem</text>
  <text x="390" y="452" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.8" fill="#445">10 PiB primary + 10 PiB archival · ~100 GB/s · /home · /scratch</text>

  <!-- footer stats -->
  <text x="390" y="492" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1f2a6b">2,906 compute nodes · ~20 PFLOPS · Rocky Linux 9.6 · SLURM 23.11.10</text>
</svg>
